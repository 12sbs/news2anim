# ============================================================
#  KONFIGURASI news2anim
#  Ubah file ini untuk menyesuaikan channel, suara, karakter.
# ============================================================

# ---- Sumber berita (RSS) — INTERNASIONAL terpercaya (bahasa Inggris) ----
news:
  feeds:
    - https://feeds.bbci.co.uk/news/world/rss.xml        # BBC World
    - https://www.aljazeera.com/xml/rss/all.xml          # Al Jazeera
    - https://www.theguardian.com/world/rss              # The Guardian World
    - https://feeds.npr.org/1004/rss.xml                 # NPR World
  max_per_run: 1            # berapa berita diproses tiap kali pipeline jalan
  fetch_fulltext: true      # ambil teks penuh dari halaman artikel (RSS sering pendek)
  min_chars: 200            # lewati artikel terlalu pendek
  max_chars: 2500           # potong teks panjang (lebih besar utk naskah 2 menit)

# ---- Pembuat naskah (LLM lokal via Ollama) ----
# Naskah dibuat 2 TAHAP:
#   A. treatment  : ringkasan naratif setia fakta (tidak keluar topik)
#   B. scenes      : treatment dipecah jadi adegan + reka adegan utk video
script:
  use_ollama: true          # false = fallback sederhana (tanpa dramatisasi)
  ollama_url: http://localhost:11434
  model: llama3.2:3b        # model ringan; ganti sesuai yang kamu punya
  language: English         # bahasa naskah & suara (target internasional)
  max_scenes: 16            # batas adegan (lebih banyak utk video >= 2 menit)
  target_words: 480         # target kata naskah (~2.5 menit narasi)
  allow_reenactment: true   # boleh reka adegan kejadian yg DISEBUTKAN berita
  save_treatment: true      # simpan treatment.txt utk ditinjau

# ---- Suara (Piper TTS) ----
tts:
  piper_bin: piper          # path ke binary piper (atau "piper" jika di PATH)
  # Unduh model suara Indonesia dari:
  # https://huggingface.co/rhasspy/piper-voices/tree/main/id/id_ID
  voices:
    Anchor:  models/en_US-lessac-medium.onnx
    Host:    models/en_US-lessac-medium.onnx
    Narrator: models/en_US-lessac-medium.onnx
    Reporter: models/en_US-lessac-medium.onnx
    default: models/en_US-lessac-medium.onnx
  speed: 1.0

# ---- Lip-sync (Rhubarb) ----
lipsync:
  rhubarb_bin: rhubarb      # path ke binary rhubarb
  recognizer: pocketSphinx   # 'phonetic' lebih cepat tapi kasar

# ---- Karakter ----
character:
  name: host
  dir: assets/characters/host    # folder berisi body.png + mouth_*.png
  # posisi karakter di layar (rasio 0..1 dari ukuran video)
  pos_x: 0.5                # 0.5 = tengah horizontal
  pos_y: 0.62              # agak ke bawah
  scale: 0.85              # skala tinggi karakter relatif tinggi video
  # offset mulut relatif terhadap titik kiri-atas body (pixel pada gambar asli)
  mouth_offset_x: 0
  mouth_offset_y: 0

# ---- Video ----
video:
  width: 1280
  height: 720
  fps: 24
  min_duration_sec: 120     # target durasi minimal video (2 menit)
  # --- variasi visual (retensi) ---
  ken_burns: true           # zoom pelan pada latar agar terasa hidup
  ken_burns_zoom: 0.08      # seberapa besar zoom (0.08 = 8%)
  broll_scenes: true        # adegan reenactment jadi b-roll (tanpa karakter)
  headline_banner: true     # banner headline di adegan anchor
  banner_color: "#c8281e"   # warna banner (merah breaking-news)
  # PERINGATAN: foto artikel = HAK CIPTA media sumber -> risiko strike YouTube.
  # Default false (pakai background bertema yang aman). Aktifkan hanya bila paham risiko.
  use_article_image: false
  background_default: assets/backgrounds/studio.png
  subtitle: true
  subtitle_font: ""        # kosong = auto-deteksi font sistem (DejaVuSans dll)
  subtitle_fontsize: 40
  subtitle_color: white
  subtitle_stroke: black
  music: assets/music/bg.mp3      # kosongkan jika tak ada musik
  music_volume: 0.12
  intro: ""                       # path video intro opsional, mis. assets/intro/intro.mp4
  outro: ""

# ---- YouTube ----
youtube:
  enabled: true             # token.json sudah ada -> upload aktif
  client_secret: credentials/client_secret.json
  token: credentials/token.json
  privacy: unlisted         # MULAI unlisted (aman) -> review dulu -> baru public
  category_id: "25"        # 25 = News & Politics
  tags: [world news, international news, animated news, breaking news, explainer]
  title_prefix: ""
  description_footer: "\n\nAnimated news explainer. Source credited above. For educational purposes."

# ---- Anti-duplikasi lintas-sumber ----
dedup:
  similarity_threshold: 0.5   # 0..1; >= ini dianggap berita sama (jangan dibuat ulang)
                              # naikkan (mis. 0.6) jika terlalu agresif, turunkan jika lolos

# ---- Otomatisasi ----
automation:
  state_file: output/state.json   # menyimpan signature berita yang sudah diproses
  poll_interval_sec: 600          # mode --watch: cek feed tiap 10 menit
  keep_output_days: 7
